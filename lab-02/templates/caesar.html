<!DOCTYPE html>
<html lang="en">
<head>
    <title>Caesar Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body>

<div class="container mt-4">

    <table class="table">

        <tr>
            <td style="text-align:center;font-weight:bold;font-size:25px">
                CAESAR CIPHER
            </td>
        </tr>

        <!-- ENCRYPTION -->

        <tr>
            <td style="font-weight:bold;color:blue">ENCRYPTION</td>
        </tr>

        <tr>
            <td>

                <form id="encryptForm">

                    <div class="mb-3">
                        <label>Plain text:</label>

                        <input
                                type="text"
                                class="form-control"
                                name="inputPlainText"
                                placeholder="Input Plain Text"
                                required
                                autofocus
                        >
                    </div>

                    <div class="mb-3">
                        <label>Key:</label>

                        <input
                                type="number"
                                class="form-control"
                                name="inputKeyPlain"
                                placeholder="Input Key"
                                required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Encrypt
                    </button>

                </form>

            </td>
        </tr>

        <!-- DECRYPTION -->

        <tr>
            <td style="font-weight:bold;color:blue">DECRYPTION</td>
        </tr>

        <tr>
            <td>

                <form id="decryptForm">

                    <div class="mb-3">
                        <label>Cipher text:</label>

                        <input
                                type="text"
                                class="form-control"
                                name="inputCipherText"
                                placeholder="Input Cipher Text"
                                required
                        >
                    </div>

                    <div class="mb-3">
                        <label>Key:</label>

                        <input
                                type="number"
                                class="form-control"
                                name="inputKeyCipher"
                                placeholder="Input Key"
                                required
                        >
                    </div>

                    <button type="submit" class="btn btn-success">
                        Decrypt
                    </button>

                </form>

            </td>
        </tr>

    </table>

    <!-- RESULT -->

    <div id="resultBox" class="alert alert-info mt-3" style="display:none"></div>

</div>


<script>

document.getElementById("encryptForm").addEventListener("submit", function(e){

    e.preventDefault();

    const text = document.querySelector("[name='inputPlainText']").value
    const key = document.querySelector("[name='inputKeyPlain']").value

    fetch("/encrypt",{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:`inputPlainText=${text}&inputKeyPlain=${key}`
    })

    .then(res => res.text())
    .then(data => {

        const box = document.getElementById("resultBox")

        box.style.display="block"
        box.innerHTML=data

    })

})



document.getElementById("decryptForm").addEventListener("submit", function(e){

    e.preventDefault()

    const text = document.querySelector("[name='inputCipherText']").value
    const key = document.querySelector("[name='inputKeyCipher']").value

    fetch("/decrypt",{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:`inputCipherText=${text}&inputKeyCipher=${key}`
    })

    .then(res => res.text())
    .then(data => {

        const box = document.getElementById("resultBox")

        box.style.display="block"
        box.innerHTML=data

    })

})

</script>

</body>
</html>
