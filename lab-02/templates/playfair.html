<!DOCTYPE html>
<html lang="en">
<head>
    <title>Playfair Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
    <table class="table">
        <tr><td style="text-align:center;font-weight:bold;font-size:25px">PLAYFAIR CIPHER</td></tr>

        <tr><td style="font-weight:bold;color:blue">ENCRYPTION</td></tr>
        <tr><td>
            <form id="encryptForm">
                <div class="mb-3">
                    <label>Plain text:</label>
                    <input type="text" class="form-control" name="inputPlainText" required autofocus>
                </div>
                <div class="mb-3">
                    <label>Key:</label>
                    <input type="text" class="form-control" name="inputKeyPlain" required>
                </div>
                <button type="submit" class="btn btn-primary">Encrypt</button>
            </form>
        </td></tr>

        <tr><td style="font-weight:bold;color:blue">DECRYPTION</td></tr>
        <tr><td>
            <form id="decryptForm">
                <div class="mb-3">
                    <label>Cipher text:</label>
                    <input type="text" class="form-control" name="inputCipherText" required>
                </div>
                <div class="mb-3">
                    <label>Key:</label>
                    <input type="text" class="form-control" name="inputKeyCipher" required>
                </div>
                <button type="submit" class="btn btn-success">Decrypt</button>
            </form>
        </td></tr>
    </table>

    <div id="resultBox" class="alert alert-info mt-3" style="display:none"></div>
</div>

<script>
document.getElementById("encryptForm").addEventListener("submit", function(e){
    e.preventDefault();
    const text = document.querySelector("[name='inputPlainText']").value;
    const key = document.querySelector("[name='inputKeyPlain']").value;
    fetch("/playfair/encrypt", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `inputPlainText=${encodeURIComponent(text)}&inputKeyPlain=${encodeURIComponent(key)}`
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("resultBox").style.display = "block";
        document.getElementById("resultBox").innerHTML = data;
    });
});

document.getElementById("decryptForm").addEventListener("submit", function(e){
    e.preventDefault();
    const text = document.querySelector("[name='inputCipherText']").value;
    const key = document.querySelector("[name='inputKeyCipher']").value;
    fetch("/playfair/decrypt", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `inputCipherText=${encodeURIComponent(text)}&inputKeyCipher=${encodeURIComponent(key)}`
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("resultBox").style.display = "block";
        document.getElementById("resultBox").innerHTML = data;
    });
});
</script>
</body>
</html>
